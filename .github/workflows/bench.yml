name: bench

on:
  #push:
  #  branches: [ "master" ]
  #pull_request:
  #  branches: [ "master" ]

  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: jiro4989/setup-nim-action@v2

      - name: install nimbleutils
        run: nimble install -y https://github.com/metagn/nimbleutils@#HEAD
      
      - name: install dependencies
        run: nimble install -y

      - name: install bench dependencies
        run: |
          nimble install benchy jsony eminim json_serialization
          nimble install --passNim:"-d:release" https://github.com/disruptek/jason

      - name: check benchmarks
        run: nim r -d:checkBench tasks/bench.nim

      - name: run benchmarks
        run: nim r -d:runBench tasks/bench.nim

      - name: run JS benchmarks
        run: nim r -d:runBenchJs tasks/bench.nim

  bench-devel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: devel

      - name: install nimbleutils
        run: nimble install -y https://github.com/metagn/nimbleutils@#HEAD
      
      - name: install dependencies
        run: nimble install -y

      - name: install bench dependencies
        run: |
          nimble install benchy jsony eminim json_serialization
          nimble install --passNim:"-d:release" https://github.com/disruptek/jason

      - name: check benchmarks
        run: nim r -d:checkBench tasks/bench.nim

      - name: run benchmarks
        run: nim r -d:runBench tasks/bench.nim

      - name: run JS benchmarks
        run: nim r -d:runBenchJs tasks/bench.nim
